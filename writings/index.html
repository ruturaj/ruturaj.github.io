<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'none'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Writings — root2</title>
    <meta
      name="description"
      content="All writings, filterable by topic — each post is a deck you read like a page."
    />
    <link rel="canonical" href="https://root2.in/writings/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;1,400&display=swap"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body id="top">
    <nav class="nav" aria-label="Primary">
      <div class="wrap">
        <a class="wordmark" href="/">root<span class="two">2</span></a>
        <button
          class="nav-toggle"
          aria-label="Menu"
          aria-expanded="false"
          aria-controls="nav-links"
        >
          <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
            <path
              d="M3 6h16M3 11h16M3 16h16"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <ul class="nav-links" id="nav-links">
          <li><a href="/writings/" aria-current="page">writings</a></li>
          <li><a href="/labs/">labs</a></li>
          <li><a href="/about/">about</a></li>
        </ul>
      </div>
    </nav>

    <main>
      <header class="page-intro wrap">
        <h1>Writings</h1>
        <p>Each post is a deck — read it like a page. Filter by topic.</p>
      </header>

      <section class="wrap">
        <div class="filters" role="group" aria-label="Filter by topic">
          <button class="chip" data-filter="all" aria-pressed="true">All</button>
          <button class="chip" data-filter="product" aria-pressed="false">
            Product
          </button>
          <button class="chip" data-filter="real-estate" aria-pressed="false">
            Real estate
          </button>
          <button class="chip" data-filter="observations" aria-pressed="false">
            Observations
          </button>
          <button class="chip" data-filter="learnings" aria-pressed="false">
            Learnings
          </button>
        </div>

        <ul class="deck-links">
          <li data-topic="learnings">
            <a href="/writings/sample-deck/">
              <span>
                <span class="dl-topic">Learnings</span>
                <span class="dl-title">Sample deck title</span>
                <span class="dl-summary"
                  >A short summary of what this post is about.</span
                >
              </span>
              <span class="dl-meta">3 slides · 2 min</span>
            </a>
          </li>
        </ul>
        <p class="empty" hidden>No writings in this topic yet.</p>
      </section>
    </main>

    <footer class="site-foot">
      <div class="wrap">
        <a class="wordmark" href="/">root<span class="two">2</span></a>
        <span class="copyright">© 2026 Ruturaj Dhekane</span>
        <a href="#top">Back to top ↑</a>
      </div>
    </footer>

    <script src="/assets/js/main.js" defer></script>
  </body>
</html>
